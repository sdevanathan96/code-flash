<!DOCTYPE html>
<html th:replace="layout/base :: layout(~{::content})">
<th:block th:fragment="content">

  <div class="row g-4">

    <!-- ── Stat cards row ── -->
    <div class="col-6 col-md-3">
      <div class="card h-100 text-center">
        <div class="card-body">
          <div class="display-4 fw-bold text-danger" th:text="${summary.dueToday}">0</div>
          <div class="text-muted small">Due Today</div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card h-100 text-center">
        <div class="card-body">
          <div class="display-4 fw-bold text-warning" th:text="${summary.currentStreak}">0</div>
          <div class="text-muted small">Day Streak 🔥</div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card h-100 text-center">
        <div class="card-body">
          <div class="display-4 fw-bold text-info" th:text="${summary.totalSolves}">0</div>
          <div class="text-muted small">Total Solves</div>
        </div>
      </div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card h-100 text-center">
        <div class="card-body">
          <div class="display-4 fw-bold text-success" th:text="${summary.totalProblems}">0</div>
          <div class="text-muted small">Problems</div>
        </div>
      </div>
    </div>

    <!-- ── Start review button ── -->
    <div class="col-12">
      <div class="card">
        <div class="card-body d-flex align-items-center justify-content-between flex-wrap gap-3">
          <div>
            <h5 class="mb-1">Ready to review?</h5>
            <p class="text-muted mb-0"
               th:text="${summary.dueToday} + ' problems are due today'">
              0 problems are due today
            </p>
          </div>
          <div class="d-flex gap-2">
            <a href="/review" class="btn btn-primary btn-lg">
              <i class="bi bi-play-fill"></i> Start Review
            </a>
            <a href="/problems/random" class="btn btn-outline-secondary btn-lg">
              <i class="bi bi-shuffle"></i> Random
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Weakest patterns ── -->
    <div class="col-12 col-lg-6">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-exclamation-triangle text-warning"></i> Weakest Patterns</span>
          <a href="/stats" class="btn btn-sm btn-outline-secondary">View all</a>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <tbody>
            <tr th:each="p : ${weakPatterns}">
              <td class="ps-3 py-2">
                <div class="fw-medium" th:text="${p.tagName}">Tag</div>
                <div class="mastery-bar mt-1">
                  <div class="mastery-fill"
                       th:style="'width:' + ${#numbers.formatDecimal(p.masteryScore * 100, 1, 0)} + '%'">
                  </div>
                </div>
              </td>
              <td class="text-end pe-3 py-2">
                <small class="text-muted"
                       th:text="${#numbers.formatDecimal(p.masteryScore * 100, 1, 0)} + '%'">
                  0%
                </small>
              </td>
              <td class="pe-3 py-2">
                <!-- Trend arrow -->
                <i class="bi bi-arrow-up-circle-fill trend-improving"
                   th:if="${p.trendDirection == 'improving'}"></i>
                <i class="bi bi-arrow-down-circle-fill trend-declining"
                   th:if="${p.trendDirection == 'declining'}"></i>
                <i class="bi bi-dash-circle trend-stable"
                   th:if="${p.trendDirection == 'stable'}"></i>
                <i class="bi bi-star-fill trend-new"
                   th:if="${p.trendDirection == 'new'}"></i>
              </td>
            </tr>
            <tr th:if="${weakPatterns.empty}">
              <td colspan="3" class="text-center text-muted py-3">
                Solve some problems to see pattern stats
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Activity heatmap ── -->
    <div class="col-12 col-lg-6">
      <div class="card h-100">
        <div class="card-header">
          <i class="bi bi-calendar3"></i> Activity (last 52 weeks)
        </div>
        <div class="card-body">
          <div id="heatmap" class="d-flex flex-wrap gap-0"></div>
          <div class="d-flex gap-3 mt-2 small text-muted">
            <span><span class="heatmap-cell" style="background:#ebedf0"></span> None</span>
            <span><span class="heatmap-cell" style="background:#9be9a8"></span> 1-2</span>
            <span><span class="heatmap-cell" style="background:#40c463"></span> 3-5</span>
            <span><span class="heatmap-cell" style="background:#30a14e"></span> 6+</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>

    async function renderHeatmap() {
      const resp = await fetch('/api/stats/heatmap');
      const data = await resp.json();

      const counts = {};
      data.forEach(d => counts[d.date] = d.count);

      const container = document.getElementById('heatmap');
      const today = new Date();
      const start = new Date(today);
      start.setDate(start.getDate() - 363);

      for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const key = d.toISOString().split('T')[0];
        const count = counts[key] || 0;
        const cell = document.createElement('span');
        cell.className = 'heatmap-cell';
        cell.title = `${key}: ${count} solves`;
        cell.style.background =
            count === 0 ? 'var(--bs-border-color)' :
                count <= 2  ? '#9be9a8' :
                    count <= 5  ? '#40c463' : '#30a14e';
        container.appendChild(cell);
      }
    }

    renderHeatmap();
  </script>

</th:block>
</html>
