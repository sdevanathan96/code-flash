<!DOCTYPE html>
<html th:replace="layout/base :: layout(~{::content})" th:fragment="detail-page">
<th:block th:fragment="content">

  <div class="row g-4">

    <!-- Problem header -->
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex align-items-start justify-content-between flex-wrap gap-2">
            <div>
              <h4 th:text="${problem.title}">Problem Title</h4>
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <span class="badge"
                      th:classappend="${problem.difficulty.name() == 'EASY'} ? 'badge-easy' :
                                      (${problem.difficulty.name() == 'MEDIUM'} ? 'badge-medium' : 'badge-hard')"
                      th:text="${problem.difficulty}">EASY</span>
                <span class="badge bg-secondary rounded-pill"
                      th:each="tag : ${problem.tags}"
                      th:text="${tag}">Tag</span>
              </div>
            </div>
            <a th:href="${problem.url}" target="_blank"
               class="btn btn-outline-primary">
              <i class="bi bi-box-arrow-up-right"></i> Open on LeetCode
            </a>
          </div>

          <!-- SRS stats row -->
          <div class="row g-3 mt-2">
            <div class="col-auto">
              <small class="text-muted">Next due</small>
              <div class="fw-bold" th:text="${problem.dueLabel}">Today</div>
            </div>
            <div class="col-auto">
              <small class="text-muted">Interval</small>
              <div class="fw-bold" th:text="${problem.intervalDays} + ' days'">1 days</div>
            </div>
            <div class="col-auto">
              <small class="text-muted">Ease factor</small>
              <div class="fw-bold"
                   th:text="${#numbers.formatDecimal(problem.easeFactor, 1, 2)}">2.50</div>
            </div>
            <div class="col-auto">
              <small class="text-muted">Total solves</small>
              <div class="fw-bold" th:text="${problem.totalSolves}">0</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Solve history timeline -->
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <i class="bi bi-clock-history"></i> Solve History
        </div>
        <div class="card-body">
          <div th:if="${history.empty}" class="text-muted text-center py-3">
            No solve history yet.
            <a th:href="@{/review}">Start a review session</a> to add one.
          </div>

          <!-- Timeline -->
          <div class="timeline" th:if="${!history.empty}">
            <div class="d-flex gap-3 mb-4"
                 th:each="h : ${history}">

              <!-- Confidence dot -->
              <div class="flex-shrink-0">
                <span class="badge rounded-circle p-2"
                      th:classappend="${h.confidence.name() == 'EASY'} ? 'badge-easy' :
                                      (${h.confidence.name() == 'GOOD'} ? 'bg-primary' :
                                      (${h.confidence.name() == 'HARD'} ? 'bg-warning text-dark' : 'bg-danger'))"
                      th:text="${h.confidence.name().charAt(0)}">G</span>
              </div>

              <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="fw-medium" th:text="${h.confidence}">GOOD</span>
                  <small class="text-muted"
                         th:text="${#temporals.format(h.solvedAt, 'MMM d yyyy, HH:mm')}">
                    Jan 1 2025
                  </small>
                </div>
                <p class="mb-0 text-muted small"
                   th:if="${!#strings.isEmpty(h.notes)}"
                   th:text="${h.notes}">
                  Notes here
                </p>
                <p class="mb-0 text-muted small fst-italic"
                   th:if="${#strings.isEmpty(h.notes)}">
                  No notes
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</th:block>
</html>
