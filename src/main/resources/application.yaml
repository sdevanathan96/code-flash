spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codeflash
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

  flyway:
    enabled: false

logging:
  level:
    org.flywaydb: DEBUG
    com.zaxxer.hikari: DEBUG

leetcode:

  session-cookie: ""
  csrf-token: ""

algorithm:
  type: velocity       # Options: sm2 | velocity
  sm2:
    min-ease-factor: 1.3
    max-ease-factor: 2.5
    initial-ease-factor: 2.5
    again-ease-delta: -0.20
    hard-ease-delta: -0.15
    easy-ease-delta: 0.15
    hard-interval-multiplier: 1.2
    easy-interval-multiplier: 1.3
    first-solve-interval: 1
    second-solve-interval: 2
  velocity:
    baseline-daily-solves: 1.0
    min-velocity-factor: 1.0
    max-velocity-factor: 5.0
    window-days: 3

enrichment:
  enabled: true
  batch-size: 100
  interval-days: 1

backup:
  directory: ${user.home}/codeflash-backups
  db-name: codeflash
  db-user: postgres
  retention-days: 30
  pg-dump-path: /opt/homebrew/opt/postgresql@16/bin/pg_dump
  pg-restore-path: /opt/homebrew/opt/postgresql@16/bin/psql
  restore:
    enabled: false